name: AIAgentApp

options:
  bundleIdPrefix: com.sjsu.cmpe277
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  AIAgentApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AIAgentApp
    settings:
      base:
        SWIFT_VERSION: 5.0
        PRODUCT_BUNDLE_IDENTIFIER: com.sjsu.cmpe277.aiagentapp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: AIAgentApp/Info.plist
    info:
      path: AIAgentApp/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocalNetworkUsageDescription: "AI Prep Coach needs local network access to connect to the backend server."
        NSBonjourServices:
          - _http._tcp
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: AIAgentApp/AIAgentApp.entitlements
